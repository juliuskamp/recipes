name: Generate PDFs

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Detect changed recipes
        id: changes
        run: |
          # Find previous tag
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p' || echo "")
          if [ -z "$PREV_TAG" ]; then
            # First release: all recipes are new
            CHANGED=$(find recipes -maxdepth 1 -name '*.json' ! -name 'index.json' | sort)
          else
            CHANGED=$(git diff --name-only "$PREV_TAG"..HEAD -- 'recipes/*.json' | grep -v 'index.json' | sort || true)
          fi

          echo "Changed recipe files:"
          echo "$CHANGED"

          # Extract recipe IDs (filename without .json)
          IDS=$(echo "$CHANGED" | sed -n 's|recipes/\(.*\)\.json|\1|p' | sort -u)
          echo "Recipe IDs: $IDS"
          echo "ids=$IDS" >> "$GITHUB_OUTPUT"

      - name: Generate PDFs
        run: |
          mkdir -p pdfs

          IDS="${{ steps.changes.outputs.ids }}"
          if [ -z "$IDS" ]; then
            echo "No recipe changes detected."
            exit 0
          fi

          # Start a local server for Puppeteer
          npx serve . -p 8080 &
          sleep 3

          for id in $IDS; do
            echo "Generating PDF for: $id"
            node -e "
              const puppeteer = require('puppeteer');
              (async () => {
                const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
                const page = await browser.newPage();
                await page.goto('http://localhost:8080/#${id}', { waitUntil: 'networkidle0' });
                await page.pdf({
                  path: 'pdfs/${id}.pdf',
                  format: 'A4',
                  printBackground: true,
                  margin: { top: '1cm', bottom: '1cm', left: '1.5cm', right: '1.5cm' }
                });
                await browser.close();
              })();
            "
          done

          kill %1 || true

      - name: Build release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p' || echo "")
          NOTES=""

          if [ -z "$PREV_TAG" ]; then
            ADDED=$(find recipes -maxdepth 1 -name '*.json' ! -name 'index.json' -exec basename {} .json \; | sort)
            for id in $ADDED; do
              NOTES="${NOTES}* Added: ${id}\n"
            done
          else
            ADDED=$(git diff --name-only --diff-filter=A "$PREV_TAG"..HEAD -- 'recipes/*.json' | grep -v index | sed 's|recipes/\(.*\)\.json|\1|' | sort -u)
            MODIFIED=$(git diff --name-only --diff-filter=M "$PREV_TAG"..HEAD -- 'recipes/*.json' | grep -v index | sed 's|recipes/\(.*\)\.json|\1|' | sort -u)
            DELETED=$(git diff --name-only --diff-filter=D "$PREV_TAG"..HEAD -- 'recipes/*.json' | grep -v index | sed 's|recipes/\(.*\)\.json|\1|' | sort -u)

            for id in $ADDED; do NOTES="${NOTES}* Added: ${id}\n"; done
            for id in $MODIFIED; do NOTES="${NOTES}* Modified: ${id}\n"; done
            for id in $DELETED; do NOTES="${NOTES}* Deleted: ${id}\n"; done
          fi

          echo -e "$NOTES"
          EOF_MARKER=$(openssl rand -hex 8)
          echo "notes<<$EOF_MARKER" >> "$GITHUB_OUTPUT"
          echo -e "$NOTES" >> "$GITHUB_OUTPUT"
          echo "$EOF_MARKER" >> "$GITHUB_OUTPUT"

      - name: Upload PDFs to release
        if: hashFiles('pdfs/*.pdf') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for pdf in pdfs/*.pdf; do
            [ -f "$pdf" ] || continue
            gh release upload "${{ github.event.release.tag_name }}" "$pdf" --clobber
          done

      - name: Update release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh release view "${{ github.event.release.tag_name }}" --json body -q .body)
          NOTES="${{ steps.notes.outputs.notes }}"
          BODY="${EXISTING}

          ## Recipe Changes
          ${NOTES}"
          gh release edit "${{ github.event.release.tag_name }}" --notes "$BODY"
