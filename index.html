<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Julius' Recipes</title>
  <meta name="color-scheme" content="light dark">
  <link rel="stylesheet" href="css/main.css">
</head>

<body>
  <header>
    <div class="header-top">
      <h1><a href="#" id="home-link">Julius' Recipes</a></h1>
      <div class="header-controls">
        <button id="cook-toggle" class="cook-btn hidden">Cook</button>
        <div class="btn-group">
          <button id="theme-light" class="group-btn active" aria-label="Light mode">☀</button>
          <button id="theme-dark" class="group-btn" aria-label="Dark mode">☽</button>
        </div>
        <div class="btn-group">
          <button id="unit-metric" class="group-btn active">Metric</button>
          <button id="unit-imperial" class="group-btn">Imperial</button>
        </div>
        <div class="btn-group">
          <button id="lang-en" class="group-btn active">EN</button>
          <button id="lang-de" class="group-btn">DE</button>
        </div>
      </div>
    </div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search recipes...">
    </div>
    <div id="filter-bar" class="filter-bar">
      <div id="meal-type-filters" class="filter-group"></div>
      <div class="filter-divider"></div>
      <div id="tag-filters" class="filter-group"></div>
    </div>
  </header>

  <main>
    <div id="index-view" class="index-view"></div>
    <div id="search-view" class="search-view hidden"></div>
    <div id="recipe-view" class="recipe-view hidden"></div>
  </main>

  <script src="js/converter.js"></script>
  <script src="js/scaler.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
